<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐選擇困難戳戳樂</title>
    <!-- 引入 8-bit 風格字體 與 中文像素風格字體 -->
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* 全局變數與基礎設定 */
        :root {
            --wood-light: #d28c4b;
            --wood-medium: #aa6531;
            --wood-dark: #6e3a17;
            --wood-darker: #3e1f0b;
            --ui-bg: #e6b881;
            --text-color: #3e1f0b;
            --border-width: 4px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            /* 加入 DotGothic16 以支援中文像素字體 */
            font-family: 'Press Start 2P', 'DotGothic16', monospace;
            background-color: var(--wood-medium);
            /* 純木頭色背景 (已移除紋理) */
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            /* 確保所有圖像維持像素邊緣 */
            image-rendering: pixelated; 
        }

        /* 標題區塊 */
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--ui-bg);
            border: var(--border-width) solid var(--wood-darker);
            box-shadow: 
                inset 4px 4px 0 rgba(255,255,255,0.4),
                inset -4px -4px 0 rgba(0,0,0,0.2),
                8px 8px 0 rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-size: 20px;
            margin: 0 0 10px 0;
            line-height: 1.5;
            color: var(--wood-darker);
        }

        .header p {
            font-size: 10px;
            margin: 0;
            line-height: 1.5;
        }

        /* 遊戲網格 */
        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: var(--wood-dark);
            padding: 12px;
            border: var(--border-width) solid var(--wood-darker);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
            max-width: 95vw;
        }

        /* 單個格子 */
        .cell {
            width: 64px;
            height: 64px;
            background: var(--ui-bg);
            border: 2px solid var(--wood-darker);
            position: relative;
            cursor: pointer;
            box-shadow: inset -4px -4px 0 rgba(0,0,0,0.15);
        }

        @media (max-width: 400px) {
            .cell {
                width: 14vw;
                height: 14vw;
            }
        }

        .cell:hover {
            filter: brightness(1.1);
        }

        /* 食物圖示 (隱藏在雜草下) */
        .food-icon {
            width: 100%;
            height: 100%;
            padding: 8px;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.revealed .food-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* 雜草覆蓋層 */
        .cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #557d2a;
            border: 2px solid #2e4712;
            box-shadow: inset 4px 4px 0 #7ca847;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .cell.revealed .cover {
            display: none;
        }

        /* 碎裂粒子 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #7ca847;
            z-index: 10;
            pointer-events: none;
            border: 1px solid #2e4712;
        }

        /* 彈窗設計 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .dialog-box {
            background: var(--ui-bg);
            border: 6px solid var(--wood-darker);
            padding: 20px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 
                inset 6px 6px 0 rgba(255,255,255,0.3),
                inset -6px -6px 0 rgba(0,0,0,0.15),
                10px 10px 0 rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .dialog-box {
            transform: translateY(0);
        }

        /* 漂浮動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .dialog-icon {
            width: 96px;
            height: 96px;
            margin: 10px 0 20px 0;
            animation: float 2s ease-in-out infinite;
        }

        .dialog-title {
            font-size: 16px;
            color: #b03a2e; /* 深紅色強調 */
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .dialog-desc {
            font-size: 10px;
            line-height: 1.8;
            color: var(--wood-darker);
            margin-bottom: 20px;
        }

        .close-btn {
            background: var(--wood-light);
            border: 3px solid var(--wood-darker);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 10px;
            color: var(--wood-darker);
            cursor: pointer;
            box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), 4px 4px 0 rgba(0,0,0,0.2);
        }

        .close-btn:active {
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.2), 0px 0px 0 rgba(0,0,0,0);
            transform: translate(2px, 2px);
        }

        /* 開場畫面 (用於啟動音樂) */
        .intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--wood-medium);
            /* 已移除紋理 */
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--ui-bg);
            text-align: center;
            text-shadow: 2px 2px 0 var(--wood-darker);
        }

        .start-btn {
            margin-top: 30px;
            background: #7ca847;
            color: white;
            border: 4px solid #2e4712;
            padding: 15px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            box-shadow: inset 3px 3px 0 rgba(255,255,255,0.4), 6px 6px 0 rgba(0,0,0,0.3);
        }
        .start-btn:hover { background: #8bc34a; }

        /* 浮動控制按鈕 (音樂開關、重置) */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 50;
        }

        .icon-btn {
            background: var(--wood-light);
            border: 3px solid var(--wood-darker);
            padding: 10px;
            font-family: inherit;
            color: var(--wood-darker);
            cursor: pointer;
            box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), 4px 4px 0 rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            font-size: 16px;
        }

        .icon-btn:active {
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.2), 0px 0px 0 rgba(0,0,0,0);
            transform: translate(2px, 2px);
        }
    </style>
</head>
<body>

    <!-- 開場畫面：用於啟動音效與遊戲 -->
    <div class="intro-screen" id="introScreen">
        <h1 style="font-size: 24px; line-height: 1.5; padding: 20px;">歡迎來到<br>午餐選擇困難戳戳樂</h1>
        <p style="font-size: 12px;">準備好你的運氣了嗎？</p>
        <button class="start-btn" onclick="startGame()">點擊開始</button>
    </div>

    <!-- 遊戲主畫面 -->
    <div class="header">
        <h1>午餐選擇困難戳戳樂</h1>
        <p>點擊雜草，看看發現了什麼！</p>
    </div>

    <div class="game-board" id="board">
        <!-- 格子將由 JavaScript 動態生成 -->
    </div>

    <!-- 彈窗對話框 -->
    <div class="modal-overlay" id="modal">
        <div class="dialog-box">
            <div class="dialog-icon" id="dialogIcon"></div>
            <div class="dialog-title" id="dialogTitle">食物名稱</div>
            <div class="dialog-desc" id="dialogDesc">食物描述...</div>
            <button class="close-btn" onclick="closePopup()">收下</button>
        </div>
    </div>

    <!-- 控制按鈕區 -->
    <div class="controls">
        <button class="icon-btn" id="randomPickBtn" onclick="randomPick()" style="padding: 0 15px; font-size: 12px;">🤔 幫我選</button>
        <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🎵</button>
        <button class="icon-btn" id="resetBtn" onclick="resetGame()" style="display: none; padding: 0 15px; font-size: 12px;">🔄 重來</button>
    </div>

    <script>
        // ==========================================
        // 核心功能 1: 像素 SVG 產生器
        // ==========================================
        // 利用 ASCII Art 陣列和調色盤，快速產生完美的 16x16 像素 SVG 圖形
        function createPixelArt(ascii, palette) {
            const rows = ascii.trim().split('\n');
            const h = rows.length;
            const w = rows[0].length;
            let rects = '';
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const char = rows[y][x];
                    if (char !== '.' && char !== ' ') {
                        const color = palette[char] || '#000';
                        rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${color}" />`;
                    }
                }
            }
            return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">${rects}</svg>`;
        }

        // ==========================================
        // 圖形資料 (ASCII Art)
        // ==========================================
        // 雜草 (覆蓋層)
        const weedSvg = createPixelArt(`
            ................
            ......ll........
            .....lmmll......
            ....lmmmddl.....
            ....lmmmmdl.....
            ...llmmmmddl....
            ..lmmmmlmdddl...
            .lmmmmmmlmdddl..
            .lmmmmmmmmmddl..
            .lmmmmlmmmmmddl.
            ..lmmllmmmmdddl.
            ...ll..lmmmddd..
            .......lmdddl...
            ........lddl....
            .........ll.....
            ................
        `, {
            'l': '#8bc34a', // 亮綠
            'm': '#557d2a', // 中綠
            'd': '#2e4712'  // 暗綠
        });

        // ==========================================
        // ★ 自訂食物清單 ★
        // 你可以在這裡依照格式新增更多食物！
        // ==========================================
        const foodDatabase = [
            // 【教學】如何上傳你自己的圖片：
            // 1. 將 imgUrl 替換成你的圖片路徑。例如：'./images/my-cake.png' (如果你把圖片放在 images 資料夾裡)
            // 2. 也可以直接貼上網路上的圖片網址！(例如 imgur 的連結)
            {
                name: '神秘金蘋果',
                desc: '『閃閃發光，咬下去有金屬的聲音。』',
                // 這裡示範使用外部圖片網址 (記得保留單引號)
                imgUrl: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f34e.png'
            },
            {
                name: '生魚片',
                desc: '『一片切得整齊的生魚。營養又方便。』',
                svg: createPixelArt(`
                    ................
                    ................
                    ................
                    .......rr.......
                    ......rrrr......
                    .....rrwwrr.....
                    ....rrwwwwrr....
                    ...rrwwwwwwrr...
                    ..rrwwrrrrwwrr..
                    ..rrwwrrrrwwrr..
                    ..rrwwwwwwwwrr..
                    ...rrwwrrwwrr...
                    ....rrrrrrrr....
                    .....rrrrrr.....
                    .......rr.......
                    ................
                `, { 'r': '#e63946', 'w': '#f1faee' })
            },
            {
                name: '幸運午餐',
                desc: '『這會讓你覺得今天非常幸運！』',
                svg: createPixelArt(`
                    ................
                    ......wwww......
                    ....wwwyywww....
                    ...wwyyyyyyww...
                    ..wwyyywwyyyww..
                    ..wwywwwwwwyww..
                    .wwyywggwwyyyww.
                    .wwyywgwwwyyyww.
                    .wwyywwwwwyyyww.
                    ..wwywwwwwwyww..
                    ..wwyyywwyyyww..
                    ...wwyyyyyyww...
                    ....wwwyywww....
                    ......wwww......
                    ................
                    ................
                `, { 'w': '#f8f9fa', 'y': '#ffca3a', 'g': '#8bc34a' })
            },
            {
                name: '奇怪的小圓麵包',
                desc: '『它聞起來... 很有趣。』',
                svg: createPixelArt(`
                    ................
                    ................
                    ......bbbb......
                    ....bbddddbb....
                    ...bddddddddb...
                    ..bddppddppddb..
                    ..bddppddppddb..
                    .bddddddddddddb.
                    .bddddppddppddb.
                    .bddddppddppddb.
                    ..bddddddddddb..
                    ...bbddddddbb...
                    .....bbbbbb.....
                    ................
                    ................
                    ................
                `, { 'b': '#4a4e69', 'd': '#22223b', 'p': '#9a8c98' })
            },
            {
                name: '大黃派',
                desc: '『酸酸甜甜，像極了冒險的味道。』',
                svg: createPixelArt(`
                    ................
                    ......cccc......
                    ....ccrrrrcc....
                    ...crrrrrrrrc...
                    ..crrrrrrrrrrc..
                    .crrccrrrrccrrc.
                    .crrccrrrrccrrc.
                    .crrrrrrrrrrrrc.
                    .crrccrrrrccrrc.
                    ..crrrrrrrrrrc..
                    ...crrrrrrrrc...
                    ....ccrrrrcc....
                    ......cccc......
                    .......ss.......
                    .......ss.......
                    ................
                `, { 'c': '#d4a373', 'r': '#e63946', 's': '#adb5bd' })
            },
            {
                name: '南瓜湯',
                desc: '『秋天的溫暖縮影，讓人平靜。』',
                svg: createPixelArt(`
                    ................
                    ................
                    ......oooo......
                    ....oooyyooo....
                    ...ooyyyyyyoo...
                    ..ooyyyyyyyyoo..
                    ..ooyywyywyyoo..
                    .oooyyyyyyyyooo.
                    .oooooooooooooo.
                    .oooooooooooooo.
                    ..oooooooooooo..
                    ...oooooooooo...
                    ....oooooooo....
                    ......oooo......
                    ................
                    ................
                `, { 'o': '#f4a261', 'y': '#e9c46a', 'w': '#fff' })
            }
        ];

        // ==========================================
        // 遊戲邏輯與狀態
        // ==========================================
        const GRID_SIZE = 25;
        let boardFoods = [];
        let revealedCount = 0;

        // 初始化遊戲版面
        function initGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            boardFoods = [];
            revealedCount = 0;
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('randomPickBtn').style.display = 'flex';

            // 隨機為 25 個格子分配食物
            for (let i = 0; i < GRID_SIZE; i++) {
                // 從資料庫中隨機挑選一個
                const randomFood = foodDatabase[Math.floor(Math.random() * foodDatabase.length)];
                boardFoods.push({ ...randomFood, revealed: false });

                // 建立格子 HTML
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                // 食物圖示層
                const foodIcon = document.createElement('div');
                foodIcon.className = 'food-icon';
                
                // 判斷：如果有圖片路徑 (imgUrl) 就顯示圖片，否則顯示 SVG 繪圖
                if (randomFood.imgUrl) {
                    foodIcon.innerHTML = `<img src="${randomFood.imgUrl}" alt="${randomFood.name}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">`;
                } else {
                    foodIcon.innerHTML = randomFood.svg;
                }

                // 雜草覆蓋層
                const cover = document.createElement('div');
                cover.className = 'cover';
                cover.innerHTML = weedSvg;

                cell.appendChild(foodIcon);
                cell.appendChild(cover);

                // 點擊事件
                cell.addEventListener('click', (e) => handleCellClick(i, cell, e));
                board.appendChild(cell);
            }
        }

        // 處理格子點擊
        function handleCellClick(index, cellElement, event) {
            const food = boardFoods[index];
            if (food.revealed) return; // 已經翻開就忽略

            food.revealed = true;
            cellElement.classList.add('revealed');
            revealedCount++;
            
            // 顯示重置按鈕
            if (revealedCount > 0) {
                document.getElementById('resetBtn').style.display = 'flex';
            }
            // 如果全部翻開，隱藏「幫我選」按鈕
            if (revealedCount >= GRID_SIZE) {
                document.getElementById('randomPickBtn').style.display = 'none';
            }

            // 播放音效
            playPopSound();

            // 觸發像素碎裂特效
            createShatterEffect(event.clientX, event.clientY, cellElement);

            // 延遲一點點顯示彈窗，讓玩家看清楚爆破與出現的食物
            setTimeout(() => {
                showPopup(food);
            }, 400);
        }

        // 像素碎裂特效 (產生 DOM 粒子)
        function createShatterEffect(x, y, targetElement) {
            const rect = targetElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const numParticles = 12;
            const colors = ['#8bc34a', '#557d2a', '#2e4712', '#7ca847'];

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // 起始位置在格子中心
                particle.style.left = `${centerX - 4}px`;
                particle.style.top = `${centerY - 4}px`;
                document.body.appendChild(particle);

                // 計算隨機飛散方向與距離
                const angle = Math.random() * Math.PI * 2;
                const distance = 30 + Math.random() * 50;
                const destX = Math.cos(angle) * distance;
                const destY = Math.sin(angle) * distance - 20; // 稍微往上拋

                // 使用 Web Animations API 進行動畫
                const animation = particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0.5)`, opacity: 0 }
                ], {
                    duration: 400 + Math.random() * 200,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                });

                // 動畫結束後移除 DOM
                animation.onfinish = () => particle.remove();
            }
        }

        // 顯示彈窗
        function showPopup(food) {
            document.getElementById('dialogTitle').textContent = food.name;
            document.getElementById('dialogDesc').textContent = food.desc;
            
            // 判斷：彈窗也要支援外部圖片
            if (food.imgUrl) {
                document.getElementById('dialogIcon').innerHTML = `<img src="${food.imgUrl}" alt="${food.name}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;">`;
            } else {
                document.getElementById('dialogIcon').innerHTML = food.svg;
            }
            
            document.getElementById('modal').classList.add('active');
        }

        // 關閉彈窗
        function closePopup() {
            document.getElementById('modal').classList.remove('active');
        }

        // 重置遊戲
        function resetGame() {
            initGame();
        }

        // 隨機幫我選 (從未翻開的格子中隨機挑選一個)
        function randomPick() {
            const unrevealed = [];
            boardFoods.forEach((food, index) => {
                if (!food.revealed) unrevealed.push(index);
            });

            if (unrevealed.length === 0) return; // 如果全部翻開就不動作

            const targetIndex = unrevealed[Math.floor(Math.random() * unrevealed.length)];
            const cellElement = document.querySelector(`.cell[data-index="${targetIndex}"]`);
            
            // 模擬滑鼠事件以計算爆破中心點
            const rect = cellElement.getBoundingClientRect();
            const mockEvent = {
                clientX: rect.left + rect.width / 2,
                clientY: rect.top + rect.height / 2
            };

            handleCellClick(targetIndex, cellElement, mockEvent);
        }

        // ==========================================
        // 簡易背景音樂 (Web Audio API - 田園 Lo-fi) 與 音效
        // ==========================================
        let audioCtx;
        let isMuted = false;

        // 播放「啵！」的破裂音效
        function playPopSound() {
            if (!audioCtx || isMuted || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // 復古方波
            osc.type = 'square';
            
            // 快速降頻產生復古遊戲破裂的聲音
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleMute() {
            if (!audioCtx) return;
            if (isMuted) {
                audioCtx.resume();
                document.getElementById('muteBtn').textContent = '🎵';
                isMuted = false;
            } else {
                audioCtx.suspend();
                document.getElementById('muteBtn').textContent = '🔇';
                isMuted = true;
            }
        }

        function startBGM() {
            if (audioCtx) return; // 避免重複啟動
            
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // 星露谷風格的溫暖五聲音階 (C大調: C, D, E, G, A)
            const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 329.63, 392.00, 293.66];
            let noteIndex = 0;

            function playNote() {
                if(audioCtx.state === 'suspended') return;
                
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                // 使用三角波產生柔和的 8-bit 聲音
                osc.type = 'triangle';
                osc.frequency.value = notes[noteIndex];

                // 音量包絡 (Attack, Decay) 產生撥弦/鈴聲的感覺
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);

                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 1.0);

                noteIndex = (noteIndex + 1) % notes.length;

                // 安排下一個音符 (BPM 大約 90)
                setTimeout(playNote, 600);
            }

            playNote();
        }

        // 遊戲啟動流程
        function startGame() {
            document.getElementById('introScreen').style.display = 'none';
            initGame();
            startBGM(); // 啟動背景音樂
        }
    </script>
